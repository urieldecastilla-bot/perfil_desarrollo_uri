<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<body>
     <div class="container mt-5">
        <div class="row">
            <!-- Columna Izquierda (Ocupa la mitad de la pantalla en dispositivos medianos o grandes) -->
            <div class="col-md-6 bg-light p-4 border">
                <h2>Columna Izquierda</h2>
                <p>Este es el contenido de la primera columna. Bootstrap dividirá el espacio automáticamente.</p>
            </div>
            
            <!-- Columna Derecha (Ocupa la otra mitad de la pantalla) -->
            <div class="col-md-6 bg-secondary text-white p-4 border">
                <h2>Columna Derecha</h2>
                <p>Este es el contenido de la segunda columna. En pantallas móviles se apilarán una abajo de la otra.</p>
            </div>
        </div>
    </div>

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
