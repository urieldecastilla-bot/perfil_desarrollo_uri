<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./scss/style_bootatrap.css">
</head>
<body>
<div class="grid-principal">
  <!-- Header con Navbar de Bootstrap -->
  <header class="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Mi Sitio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  
  <!-- Contenido Principal con Grid Anidado y Componentes -->
  <main class="contenido-principal">
    <!-- Componente Dinámico 1: Carousel -->
    <div id="carouselEjemplo" class="carousel slide mb-4" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active bg-primary text-white p-5 text-center">
          <h5>Slide 1: ¡Bienvenido!</h5>
        </div>
        <div class="carousel-item bg-secondary text-white p-5 text-center">
          <h5>Slide 2: Personalizado con Sass</h5>
        </div>
      </div>
    </div>

    <!-- Grid Anidado con Tarjetas de Bootstrap -->
    <section class="grid-anidado">
      <article class="card mi-tarjeta-personalizada">
        <div class="card-body">
          <h5 class="card-title">Tarjeta 1</h5>
          <p class="card-text">Clase utilitaria de Bootstrap aplicada abajo:</p>
          <!-- Utilitarios: text-uppercase (texto en mayúsculas) y fw-bold (negrita) -->
          <span class="text-uppercase fw-bold text-danger">Urgente</span>
        </div>
      </article>

      <article class="card mi-tarjeta-personalizada">
        <div class="card-body">
          <h5 class="card-title">Tarjeta 2</h5>
          <!-- Componente Dinámico 2: Botón que abre un Modal -->
          <button type="button" class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#miModal">
            Ver Detalles
          </button>
        </div>
      </article>
    </section>
  </main>
  
  <aside class="sidebar p-3">
    <h5>Anuncios</h5>
    <div class="alert alert-info" role="alert">¡Nuevo componente dinámico aquí!</div>
  </aside>
  
  <footer class="footer bg-dark text-white p-3 text-center">Footer © 2026</footer>
</div>

<!-- Estructura del Modal (Componente Dinámico 3) -->
<div class="modal fade" id="miModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Información Importante</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">Este es un modal dinámico de Bootstrap funcionando.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
